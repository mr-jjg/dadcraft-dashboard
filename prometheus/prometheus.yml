global:
  scrape_interval: 15s  # How often to collect metrics

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: 'process_exporter'
    static_configs:
      - targets: ['host.docker.internal:9256']

  - job_name: 'dadcraft_progression'
    scrape_interval: 1h
    static_configs:
      - targets: ['backend:8081']
    metrics_path: /metrics/progression

  - job_name: 'dadcraft_leaderboard'
    scrape_interval: 1m
    static_configs:
      - targets: ['backend:8081']
    metrics_path: /metrics/leaderboard
