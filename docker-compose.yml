services:
  backend:
    build: ./backend
    environment:
      PORT: "8081"
      ALLOWED_ORIGIN: "https://wow.jjg.dev"
      DB_DSN: ${DB_DSN}
    volumes:
      - /var/run/mysqld/mysqld.sock:/var/run/mysqld/mysqld.sock
    image: dadcraft-dashboard-backend:latest
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    networks: [appnet]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  frontend:
    build: ./frontend
    image: dadcraft-dashboard:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Loopback only - public access via Nginx reverse proxy
    ports:
      - "127.0.0.1:8081:80"
    networks: [appnet]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-admin-api'
      - '--storage.tsdb.retention.time=90d'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks: [appnet]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

networks:
  appnet:
    ipam:
      config:
        - subnet: 172.19.0.0/16

volumes:
  prometheus_data: